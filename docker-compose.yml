services:
  postgres:
    image: postgres:16
    container_name: book-management-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: book_management
      POSTGRES_USER: book_user
      POSTGRES_PASSWORD: book_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
